<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Anesh</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f0f0f'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='40' font-style='italic' fill='%237dffcf' text-anchor='middle'%3Ea%3C/text%3E%3C/svg%3E">
<style>
:root{--bg:#0f0f0f;--line:#262626;--text:#f2f2f2;--muted:#a1a1a1;--acc:#7dffcf}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
canvas{display:block;margin:0 auto;cursor:crosshair}
p{color:var(--muted);font-size:15.5px;margin:6px 0 28px}
a{display:inline-block;color:#111;background:#fff;text-decoration:none;font-weight:600;font-size:14.5px;padding:12px 26px;border-radius:12px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc);display:inline-block;margin-right:8px;animation:pulse 2s ease infinite}
@keyframes pulse{50%{opacity:.4}}
</style>
</head>
<body>
<div>
  <canvas id="fz404" width="640" height="200"></canvas>
  <canvas id="fzNf" width="640" height="90"></canvas>
  <p><span class="dot"></span>Halaman ini gak ada — mungkin udah pindah, mungkin belum pernah ada.</p>
  <a href="/">Balik ke home</a>
</div>
<script>
// FuzzyText — port vanilla JS dari reactbits.dev/text-animations/fuzzy-text
function fuzzy(canvasId, text, fontSize, weight, color, baseIntensity, hoverIntensity){
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(devicePixelRatio || 1, 2);
  const font = weight + ' ' + fontSize + 'px Inter, -apple-system, sans-serif';

  // render teks ke canvas offscreen dulu
  const off = document.createElement('canvas');
  const octx = off.getContext('2d');
  octx.font = font;
  const m = octx.measureText(text);
  const tw = Math.ceil(m.width) + 20;
  const th = Math.ceil(fontSize * 1.3);
  off.width = tw * dpr; off.height = th * dpr;
  octx.scale(dpr, dpr);
  octx.font = font;
  octx.textBaseline = 'middle';
  octx.fillStyle = color;
  octx.fillText(text, 10, th / 2);

  canvas.width = (tw + 60) * dpr;
  canvas.height = th * dpr;
  canvas.style.width = (tw + 60) + 'px';
  canvas.style.height = th + 'px';

  let intensity = baseIntensity;
  canvas.addEventListener('pointerenter', () => intensity = hoverIntensity);
  canvas.addEventListener('pointerleave', () => intensity = baseIntensity);
  canvas.addEventListener('pointermove', e => {
    const r = canvas.getBoundingClientRect();
    const cx = e.clientX - r.left;
    // makin dekat ke tengah, makin kacau
    intensity = hoverIntensity * (1 - Math.abs(cx - r.width / 2) / (r.width / 2)) + baseIntensity;
  });

  const fuzzRange = 30;
  (function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // gambar per-baris horizontal dengan offset acak — inti efek fuzzy
    for (let y = 0; y < off.height; y++){
      const dx = (Math.random() - 0.5) * fuzzRange * intensity * dpr;
      ctx.drawImage(off, 0, y, off.width, 1, 30 * dpr + dx, y, off.width, 1);
    }
    requestAnimationFrame(draw);
  })();
}
fuzzy('fz404', '404', 150, '900', '#f2f2f2', 0.18, 0.6);
fuzzy('fzNf', 'not found', 58, '700', '#a1a1a1', 0.12, 0.5);
</script>
</body>
</html>
