<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Anesh</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f0f0f'/%3E%3Ctext x='32' y='45' font-family='Georgia,serif' font-size='40' font-style='italic' fill='%237dffcf' text-anchor='middle'%3Ea%3C/text%3E%3C/svg%3E">
<style>
:root{--bg:#0f0f0f;--line:#262626;--text:#f2f2f2;--muted:#a1a1a1;--acc:#7dffcf}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.bl{font-family:Georgia,'Times New Roman',serif;font-style:italic}
h1{font-size:96px;font-weight:400;line-height:1;margin-bottom:10px}
h1 span{color:var(--acc)}
p{color:var(--muted);font-size:15.5px;margin-bottom:28px}
a{display:inline-block;color:#111;background:#fff;text-decoration:none;font-weight:600;font-size:14.5px;padding:12px 26px;border-radius:12px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc);display:inline-block;margin-right:8px;animation:pulse 2s ease infinite}
@keyframes pulse{50%{opacity:.4}}
</style>
</head>
<body>
<div>
  <h1 class="bl">4<span>0</span>4</h1>
  <p><span class="dot"></span>Halaman ini gak ada — mungkin udah pindah, mungkin belum pernah ada.</p>
  <a href="/">Balik ke home</a>
</div>
</body>
</html>
